AWSTemplateFormatVersion: "2010-09-09"
Description: Serverless Hello API using HTTP API v2 and Lambda

Resources:
  HelloLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: hello-lambda-role-mateus-pereira
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: hello-lambda-iac-mateus-pereira
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt HelloLambdaRole.Arn
      Code:
        S3Bucket: mateus-pereira-lambda-artifacts
        S3Key: index.zip

  HelloApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: hello-http-api
      ProtocolType: HTTP

  HelloIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HelloApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: "2.0"
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
        - { LambdaArn: !GetAtt HelloLambda.Arn }

  HelloRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HelloApi
      RouteKey: "ANY /hello"
      Target: !Sub "integrations/${HelloIntegration}"

  HelloStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HelloApi
      StageName: "$default"
      AutoDeploy: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HelloLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HelloApi}/*/*"

Outputs:
  ApiUrl:
    Description: "Invoke URL"
    Value: !Sub "https://${HelloApi}.execute-api.${AWS::Region}.amazonaws.com/hello?name=Ezops"
